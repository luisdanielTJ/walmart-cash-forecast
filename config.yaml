random_seed: 42
holdout_days: 60
n_cv_folds: 5

bayesian:
  n_chains: 4
  n_draws: 2000
  n_tune: 1000

ml:
  n_optuna_trials: 50
  quantiles: [0.1, 0.5, 0.9]

newsvendor:
  cost_underage: 3.0   # stockout cost multiplier (lost sale, customer friction)
  cost_overage: 1.0    # excess cash cost multiplier (working capital, security)

conformal:
  alpha: 0.1           # target miscoverage rate → 90% prediction intervals

denomination_fund_ratio: 0.03  # change fund = 3% of daily forecast (retail industry standard)
